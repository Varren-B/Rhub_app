<!DOCTYPE html>
<html>
<head>
    <title>Slider Image Placeholder</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; }
        .placeholder {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #6B1A26, #4A1A24);
            color: white;
            text-align: center;
            padding: 20px;
        }
        .icon { font-size: 5rem; margin-bottom: 20px; opacity: 0.7; }
        h1 { font-size: 3rem; margin-bottom: 10px; }
        p { font-size: 1.5rem; opacity: 0.9; }
    </style>
</head>
<body>
    <div class="placeholder">
        <div class="icon">
            <i class="fas fa-book-open"></i>
        </div>
        <h1>Students Studying</h1>
        <p>Students engaged in learning activities</p>
        <small style="margin-top: 20px; opacity: 1;">Replace with actual image: students-studying.jpg</small>
    </div>
</body>
</html>
